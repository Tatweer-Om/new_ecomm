name: Build and Deploy Laravel

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.app
          push: true
          tags: |
            tatweerom/tatweersoft_ecom-app:latest
            tatweerom/tatweersoft_ecom-app:${{ github.sha }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: |
            tatweerom/tatweersoft_ecom-nginx:latest
            tatweerom/tatweersoft_ecom-nginx:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            echo "🚀 Starting Deployment..."

            cd /opt/new_ecom

            echo "📥 Pulling latest Docker images from Docker Hub"
            docker compose pull

            echo "🔄 Recreating containers with latest images"
            docker compose up -d

            echo "⏳ Waiting for MySQL to become ready..."
            sleep 30

            echo "🛠 Running Laravel migrations (central database)"
            docker compose exec -T app php artisan migrate --force

            echo "🏢 Running tenant migrations (multi-tenant databases)"
            docker compose exec -T app php artisan tenants:migrate

            echo "🧹 Clearing and optimizing Laravel caches"
            docker compose exec -T app php artisan optimize:clear

            echo "✅ Deployment completed successfully!"
