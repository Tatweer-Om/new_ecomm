name: Build and Deploy Laravel

on:
  push:
    branches:
      - main # Trigger pipeline when code is pushed to main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest # GitHub runner (temporary server)

    steps:
      # Step 1: Get latest code from repository
      - name: Checkout source
        uses: actions/checkout@v4

      # Step 2: Enable Docker advanced builder (for better caching & performance)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub using secrets (secure credentials)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build Laravel App Image
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: . # Project root
          file: ./Dockerfile.app # Dockerfile for Laravel app
          push: true # Push image to Docker Hub
          tags: |
            tatweerom/tatweersoft_ecom-app:latest       # Always latest version
            tatweerom/tatweersoft_ecom-app:${{ github.sha }}  # Unique version (commit ID)

      # Step 5: Build Nginx Image
      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.nginx
          push: true
          tags: |
            tatweerom/tatweersoft_ecom-nginx:latest
            tatweerom/tatweersoft_ecom-nginx:${{ github.sha }}

  deploy:
    needs: build-and-push # Only run deploy after build success
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          # All commands below will run inside your server
          script: |
            set -e   # Stop execution if any command fails

            echo "🚀 Starting Deployment..."

            echo "📁 Navigating to project directory"
            cd /opt/new_ecom

            echo "📥 Pulling latest Docker images from Docker Hub"
            docker compose pull

            echo "🔄 Recreating containers with latest images"
            docker compose up -d

            echo "⏳ Waiting for MySQL to become ready..."
            sleep 30

            echo "🛠 Running Laravel migrations (central database)"
            docker compose exec -T app php artisan migrate --force

            echo "🏢 Running tenant migrations (multi-tenant databases)"
            docker compose exec -T app php artisan tenants:migrate

            echo "🧹 Clearing and optimizing Laravel caches"
            docker compose exec -T app php artisan optimize:clear

            echo "✅ Deployment completed successfully!"
