services:
  app:
    image: tatweerom/tatweersoft_ecom-app:latest
    container_name: ecom_app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  nginx:
    image: tatweerom/tatweersoft_ecom-nginx:latest
    container_name: ecom_nginx
    restart: unless-stopped
    ports:
      - "8083:80"
    depends_on:
      - app

mysql:
  image: mysql:8.0
  container_name: ecom_mysql
  restart: unless-stopped
  environment:
    MYSQL_DATABASE: ecom_db
    MYSQL_USER: ecom_user
    MYSQL_PASSWORD: Abdul@12345
    MYSQL_ROOT_PASSWORD: Abdul@12345
  ports:
    - "3308:3306"
  volumes:
    - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data: